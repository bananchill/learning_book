worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    keepalive_timeout 65;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # HTTP → HTTPS редирект
    server {
        listen 80;
        server_name interactive-code.ru www.interactive-code.ru;

        # Certbot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://interactive-code.ru$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        http2 on;
        server_name interactive-code.ru www.interactive-code.ru;

        ssl_certificate     /etc/letsencrypt/live/interactive-code.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/interactive-code.ru/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # www → без www
        if ($host = www.interactive-code.ru) {
            return 301 https://interactive-code.ru$request_uri;
        }

        root /usr/share/nginx/html;
        index index.html;

        # Кэш статики (js/css с хешами в имени)
        location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache";
        }

        # Запрет доступа к скрытым файлам
        location ~ /\. {
            deny all;
        }
    }
}
