# Конфиг для хостового nginx: /etc/nginx/sites-available/interactive-code.ru
# Скопировать и включить:
#   sudo cp host-nginx.conf /etc/nginx/sites-available/interactive-code.ru
#   sudo ln -s /etc/nginx/sites-available/interactive-code.ru /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS редирект
server {
    listen 80;
    listen [::]:80;
    server_name interactive-code.ru www.interactive-code.ru;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://interactive-code.ru$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name interactive-code.ru www.interactive-code.ru;

    ssl_certificate     /etc/letsencrypt/live/interactive-code.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/interactive-code.ru/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # www → без www
    if ($host = www.interactive-code.ru) {
        return 301 https://interactive-code.ru$request_uri;
    }

    # Проксируем в Docker-контейнер
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
