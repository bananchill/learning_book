name: Deploy Book

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy proxy
        run: |
          if [ -d ~/proxy ]; then
            cd ~/proxy && git pull origin main
          else
            git clone https://github.com/bananchill/proxy.git ~/proxy
          fi
          cd ~/proxy && docker compose up -d

      - name: Build and deploy
        run: |
          docker compose build --no-cache
          docker compose up -d
          docker image prune -f
